<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Media Downloader - Premium</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="min-h-screen text-ink font-sans bg-bg-dark antialiased overflow-x-hidden selection:bg-accent/30 selection:text-white">
  
  <!-- Animated Background Shapes -->
  <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-accent/20 blur-[120px] mix-blend-screen animate-blob"></div>
    <div class="absolute top-[20%] right-[-10%] w-[50%] h-[50%] rounded-full bg-[#d946ef]/15 blur-[120px] mix-blend-screen animate-blob animation-delay-2000"></div>
    <div class="absolute bottom-[-20%] left-[20%] w-[60%] h-[60%] rounded-full bg-[#22d3ee]/15 blur-[120px] mix-blend-screen animate-blob animation-delay-4000"></div>
    <div class="absolute inset-0 bg-[#050511]/60"></div> <!-- Overlay -->
  </div>

  <main class="relative z-10 min-h-screen flex items-center justify-center py-12 px-4 pb-12 w-full">
    <div class="w-full max-w-[640px] rounded-[24px] glass-panel px-6 sm:px-10 pt-10 pb-8 animate-reveal">
      <header class="mb-10 text-center">
        <p class="mb-2 text-xs font-bold tracking-[0.2em] uppercase text-accent">Video &amp; image downloader</p>
        <h1 class="text-3xl sm:text-4xl font-bold tracking-tight text-white leading-tight">Paste a link, <span class="text-transparent bg-clip-text bg-gradient-to-r from-accent to-[#d946ef]">get the file</span></h1>
      </header>

      <div class="flex flex-col relative w-full">
        <!-- Input Step -->
        <section class="transition-all duration-300" id="step-input">
          <form id="media-form" class="flex flex-col gap-4 mb-6" autocomplete="off">
            <label for="url" class="text-sm font-semibold text-ink-muted ml-1">Media URL</label>
            <div class="relative flex flex-col sm:flex-row gap-3 items-stretch">
              <div class="relative flex-grow">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                  <svg class="w-5 h-5 text-ink-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                </div>
                <input
                  id="url"
                  name="url"
                  type="url"
                  class="w-full pl-11 pr-4 py-4 rounded-[16px] border border-line bg-bg-elevated/50 backdrop-blur-sm text-white text-[1rem] outline-none transition-[border-color,box-shadow,background-color] duration-300 placeholder:text-ink-dim hover:bg-bg-elevated focus:border-accent focus:bg-bg-elevated focus:shadow-glow focus:ring-0"
                  placeholder="https://instagram.com/... or facebook.com/..."
                  required
                >
              </div>
              <button
                id="submit-btn"
                type="submit"
                class="btn inline-flex items-center justify-center gap-2 border-0 rounded-[16px] py-4 px-8 font-bold text-[1rem] cursor-pointer transition-all duration-300 whitespace-nowrap min-w-[140px] relative text-white bg-gradient-to-r from-accent to-[#d946ef] hover:shadow-glow hover:-translate-y-1 disabled:cursor-not-allowed disabled:opacity-70 disabled:hover:translate-y-0 disabled:hover:shadow-none"
              >
                <span class="btn-text flex items-center gap-2">Analyze <svg class="w-4 h-4 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg></span>
                <span class="btn-loader" aria-hidden="true">
                  <span class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                </span>
              </button>
            </div>
          </form>

          <div class="flex flex-wrap gap-2.5 justify-center mb-6" id="platform-pills">
            {% for platform in enabled_platforms %}
            <button
              type="button"
              class="pill border border-line bg-bg-elevated/40 text-ink-muted py-2 px-5 rounded-full text-sm font-semibold cursor-pointer transition-all duration-300 hover:text-white hover:bg-line hover:border-line-light hover:-translate-y-0.5"
              data-platform="{{ platform }}"
            >{{ platform }}</button>
            {% endfor %}
          </div>
          <p class="text-sm text-ink-dim m-0 text-center">Public links work best. Some sources may require login cookies.</p>
        </section>

        <!-- Loading Step -->
        <section class="hidden transition-opacity duration-500 py-12 flex flex-col items-center justify-center animate-reveal" id="step-loading" aria-live="polite">
          <div class="premium-loader mb-6"></div>
          <p class="font-bold text-lg text-white m-0 mb-1 animate-pulse">Analyzing link…</p>
          <p class="text-sm text-ink-muted m-0">Fetching formats and high-quality media</p>
        </section>

        <!-- Result Step -->
        <section class="hidden transition-opacity duration-500 animate-reveal" id="step-result">
          <div class="flex flex-col sm:flex-row sm:justify-between sm:items-end gap-4 mb-6 pb-5 border-b border-line">
            <div class="flex-grow">
              <div class="inline-flex items-center gap-2 mb-2">
                <span class="w-2 h-2 rounded-full bg-accent animate-pulse-glow"></span>
                <p id="result-platform" class="text-[0.75rem] font-bold uppercase tracking-widest text-[#d946ef] m-0"></p>
              </div>
              <h2 id="result-title" class="text-xl font-bold text-white m-0 line-clamp-1"></h2>
              <p id="result-subtitle" class="mt-1.5 text-sm text-ink-muted m-0 font-medium"></p>
            </div>
            <div class="bg-bg-elevated/80 px-4 py-2 rounded-xl border border-line backdrop-blur-sm">
              <p id="result-count" class="text-sm font-semibold text-white whitespace-nowrap m-0"></p>
            </div>
          </div>
          <div id="media-grid" class="grid gap-5 grid-cols-1 sm:grid-cols-[repeat(auto-fill,minmax(260px,1fr))]"></div>
          <div class="mt-8 pt-6 border-t border-line flex justify-center">
            <button type="button" id="back-btn" class="text-ink-muted bg-transparent border-2 border-line rounded-[16px] py-3.5 px-8 font-bold text-[0.95rem] cursor-pointer transition-all duration-300 hover:border-accent hover:text-white hover:-translate-y-0.5">
              Analyze another link
            </button>
          </div>
        </section>
      </div>

      <!-- Status Toast Container -->
      <div class="relative mt-6 min-h-[48px] flex items-center justify-center text-center">
         <div id="status" class="inline-block py-2.5 px-6 rounded-full text-sm font-semibold text-ink-muted opacity-0 transition-all duration-300 transform scale-95" role="status" aria-live="polite"></div>
      </div>
    </div>
  </main>

  <script>
    window.ENABLED_PLATFORMS = {{ enabled_platforms | tojson }};
  </script>
  <script src="/static/app.js" defer></script>
</body>
</html>
